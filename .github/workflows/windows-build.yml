name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: [ "v*" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/ZaldrionPasswordIntelligence/ZaldrionPasswordIntelligence.csproj

      - name: Publish self-contained EXE
        run: >
          dotnet publish src/ZaldrionPasswordIntelligence/ZaldrionPasswordIntelligence.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:EnableCompressionInSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/win-x64

      - name: Zip release files
        shell: pwsh
        run: Compress-Archive -Path publish/win-x64/* -DestinationPath ZaldrionPasswordIntelligence-win-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZaldrionPasswordIntelligence-win-x64
          path: ZaldrionPasswordIntelligence-win-x64.zip
